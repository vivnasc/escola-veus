<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Carrossel Véus — slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=block"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script>
    function escapeHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function nl2br(s) { return escapeHtml(s).replace(/\n/g, "<br/>"); }

    function fitToWidth(el, maxWidth, minPx) {
      if (!el) return;
      const min = minPx || 90;
      let size = parseFloat(getComputedStyle(el).fontSize);
      let g = 80;
      while (el.scrollWidth > maxWidth && size > min && g-- > 0) {
        size -= 4;
        el.style.fontSize = size + "px";
      }
    }

    function renderCapa(dia, slide) {
      const numeroBig = dia.numero;
      return `
        <div class="slide capa dark">
          <div class="grain"></div>
          <div class="vignette"></div>
          <div class="glow-gold"></div>
          <div class="ghost-num">${numeroBig}</div>
          <div class="content">
            <div class="top">
              <div class="romano-rule">
                <span class="rule"></span>
                <span class="romano">${escapeHtml(dia.romano)}</span>
                <span class="rule"></span>
              </div>
              <div class="veu">${escapeHtml(dia.veu)}</div>
              <div class="ornament">◇ &nbsp; ◇ &nbsp; ◇</div>
              <div class="subtitulo">${escapeHtml(dia.subtitulo)}</div>
            </div>
            <div class="abertura">
              ${escapeHtml(slide.linha1)}<br/>${escapeHtml(slide.linha2)}
            </div>
            <div class="footer">
              <span class="rule"></span>
              <span class="marca">os sete véus</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderConteudo(dia, slide, indice) {
      const num = String(indice + 1).padStart(2, "0");
      const ePoetico = slide.estilo === "poetico";
      const tipo = ePoetico ? "poetico" : "prosa";
      const longo = slide.texto && slide.texto.length > 200 ? "longo" : "";
      const titulo = (!ePoetico && slide.titulo)
        ? `<div class="titulo-pequeno">${escapeHtml(slide.titulo)}</div>` : "";
      const ornamentTop = ePoetico ? `<div class="ornament">~</div>` : "";
      const ornamentBot = ePoetico ? `<div class="ornament">~</div>` : "";

      return `
        <div class="slide conteudo ${tipo} light">
          <div class="grain"></div>
          <div class="vignette"></div>
          <div class="content">
            <div class="meta-top">
              <span>os sete véus</span>
              <span class="num">${num} / 06</span>
              <span>${escapeHtml(dia.romano)}</span>
            </div>
            <div class="corpo">
              ${ornamentTop}
              ${titulo}
              <div class="texto ${longo}">${nl2br(slide.texto)}</div>
              ${ornamentBot}
            </div>
            <div class="meta-bot">
              <span class="ornament">◇ &nbsp; ◇ &nbsp; ◇</span>
              <span class="marca">${escapeHtml(dia.veu.toLowerCase())}</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderCta(dia, slide) {
      return `
        <div class="slide cta dark">
          <div class="grain"></div>
          <div class="vignette"></div>
          <div class="glow-terra"></div>
          <div class="espiral-bg">🌀</div>
          <div class="content">
            <div class="icon-ring"><span class="icone">${escapeHtml(slide.icone || "")}</span></div>
            <div class="corpo">
              <div class="recurso">${escapeHtml(slide.recurso)}</div>
              <div class="descricao">${escapeHtml(slide.descricao)}</div>
            </div>
            <div class="url-block">
              <span class="rule"></span>
              <span class="url">${escapeHtml(slide.url)}</span>
              <span class="rule"></span>
            </div>
          </div>
        </div>
      `;
    }

    function render(data) {
      const { dia, slide, indiceSlide } = data;
      const root = document.getElementById("root");
      if (slide.tipo === "capa") {
        root.innerHTML = renderCapa(dia, slide);
        document.fonts.ready.then(() => {
          fitToWidth(document.querySelector(".slide.capa .veu"), 860, 110);
        });
      } else if (slide.tipo === "conteudo") {
        root.innerHTML = renderConteudo(dia, slide, indiceSlide);
      } else if (slide.tipo === "cta") {
        root.innerHTML = renderCta(dia, slide);
        document.fonts.ready.then(() => {
          fitToWidth(document.querySelector(".slide.cta .recurso"), 820, 50);
        });
      }
    }

    if (window.SLIDE_DATA) render(window.SLIDE_DATA);
    else document.body.innerHTML = "<pre>aguardando window.SLIDE_DATA…</pre>";
  </script>
</body>
</html>
