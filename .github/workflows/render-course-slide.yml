name: Render Course Slide

# Disparado pela admin UI em /admin/producao/aulas/preview/... via
# workflow_dispatch. O manifest ja foi colocado em Supabase antes do dispatch
# (course-assets/render-jobs/<jobId>.json).

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: "ID unico do render job (manifest em course-assets/render-jobs/<jobId>.json)"
        required: true
        type: string

run-name: "render-course-slide: ${{ inputs.jobId }}"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: "release"

      - name: Show FFmpeg version
        run: ffmpeg -version | head -3

      - name: Install Puppeteer deps (system libs for chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 \
            libc6 libcairo2 libcups2 libdbus-1-3 libdrm2 libexpat1 libfontconfig1 libgbm1 \
            libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 \
            libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 libnss3 lsb-release \
            wget xdg-utils || true

      - name: Install npm deps
        working-directory: tools/render-course-slide
        run: npm install --omit=dev

      - name: Render
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: tools/render-course-slide
        run: node render.mjs "${{ inputs.jobId }}"
