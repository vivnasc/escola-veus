name: Hoje em Mim · Runway Poll

# Workflow de polling do Runway: descarrega clips gerados via Runway
# API e faz upload para Supabase antes que a CDN do Runway expire.
#
# AGENDA DESATIVADA: a produção mudou para Midjourney como source de
# clips, por isso não há Runway jobs pendentes para sondar. O cron a
# correr de 30/30min só queimava minutes do GitHub Actions e enchia
# o painel de runs falhadas.
#
# Quando voltares a usar a pipeline Runway → Supabase, descomenta o
# bloco `schedule:` abaixo. O secret HEM_RUNWAY_POLL_URL e
# CRON_SECRET no repo continuam válidos.
#
# Para correr manualmente: Actions → Hoje em Mim · Runway Poll →
# "Run workflow" (workflow_dispatch).

on:
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:
    # Permite disparar manualmente a partir do GitHub UI
    inputs:
      reason:
        description: "Motivo (opcional)"
        required: false
        type: string

run-name: "hoje-em-mim/runway-poll: ${{ inputs.reason || 'manual' }}"

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call poll endpoint
        env:
          POLL_URL: ${{ secrets.HEM_RUNWAY_POLL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$POLL_URL" ]; then
            echo "HEM_RUNWAY_POLL_URL não configurada no repo secrets" >&2
            echo "Esperado: https://<vercel>.vercel.app/api/admin/hoje-em-mim/runway/poll?cron=1" >&2
            exit 1
          fi
          AUTH_HEADER=""
          if [ -n "$CRON_SECRET" ]; then
            AUTH_HEADER="-H 'Authorization: Bearer $CRON_SECRET'"
          fi
          # POST porque o endpoint suporta GET e POST mas POST é mais
          # explícito para mutation (descarrega + faz upload).
          eval "curl -fsSL -X POST $AUTH_HEADER \"$POLL_URL\" -o /tmp/poll.json"
          echo "--- response ---"
          cat /tmp/poll.json
          echo ""
