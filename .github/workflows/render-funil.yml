name: Render Funil

# Disparado pelo admin UI (/api/admin/funil/render-funil-submit) via
# workflow_dispatch. Manifest (clips, narração, música, musicVolume) em
# course-assets/render-jobs/<jobId>.json.

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: "ID único do funil render job"
        required: true
        type: string

run-name: "render-funil: ${{ inputs.jobId }}"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg (apt — inclui drawtext/libfreetype)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu
          ffmpeg -version | head -3
          # Sanity-check: o render usa drawtext para os títulos da intro/outro.
          # Se faltar, abortar já em vez de só falhar no render.
          ffmpeg -hide_banner -filters 2>&1 | grep -q "\\bdrawtext\\b" \
            || (echo "ERRO: filtro drawtext ausente na build do ffmpeg" && exit 1)
          test -f /usr/share/fonts/truetype/dejavu/DejaVuSerif.ttf \
            || (echo "ERRO: DejaVuSerif.ttf ausente" && exit 1)

      - name: Render
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: tools/render-funil
        run: node render.mjs "${{ inputs.jobId }}"
