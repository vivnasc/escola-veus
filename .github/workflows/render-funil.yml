name: Render Funil

# Disparado pelo admin UI (/api/admin/funil/render-funil-submit) via
# workflow_dispatch. Manifest (clips, narração, música, musicVolume) em
# course-assets/render-jobs/<jobId>.json.

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: "ID único do funil render job"
        required: true
        type: string

run-name: "render-funil: ${{ inputs.jobId }}"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: "release"

      - name: Show FFmpeg version
        run: ffmpeg -version | head -3

      - name: Render
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: tools/render-funil
        run: node render.mjs "${{ inputs.jobId }}"
